# Custom dist publish job, referenced by `publish-jobs = [..., "./crates-io"]` in
# dist-workspace.toml. The dist-generated release.yml invokes this after the GitHub
# Release artifacts are built, passing the dist `plan` and inheriting repo secrets.
#
# crates.io requires a library to be on the index before a crate that depends on it,
# so we publish skiagram-core first, then retry skiagram until the index catches up.
name: crates-io

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish skiagram-core, then skiagram
        shell: bash
        run: |
          set -euo pipefail
          echo "Publishing skiagram-core..."
          cargo publish -p skiagram-core
          echo "Waiting for the index to expose skiagram-core, then publishing skiagram..."
          published=false
          for i in $(seq 1 30); do
            if cargo publish -p skiagram; then published=true; break; fi
            echo "  skiagram-core not on the index yet; retry $i/30"; sleep 10
          done
          if [ "$published" != "true" ]; then
            echo "ERROR: skiagram failed to publish after retries"; exit 1
          fi
          echo "crates.io publish complete."
