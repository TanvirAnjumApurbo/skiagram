[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# A GitHub repo to push Homebrew formulas to
tap = "TanvirAnjumApurbo/homebrew-tap"
# Publish jobs to run in CI. "./crates-io" is a custom local workflow
# (.github/workflows/crates-io.yml) that publishes skiagram-core then skiagram.
publish-jobs = ["homebrew", "npm", "./crates-io"]
